<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velyx | Серверы</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0f1012; color: white; font-family: 'Outfit', sans-serif; padding: 50px; margin: 0; }
        h1 { margin-bottom: 40px; font-weight: 800; font-size: 36px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .server-card { background: #1a1c1e; border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 20px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; text-decoration: none; color: white; overflow: hidden; }
        .server-card:hover { transform: translateY(-5px); border-color: #5865F2; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .server-icon { width: 64px; height: 64px; flex-shrink: 0; border-radius: 50%; background: #2f3136; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; overflow: hidden; }
        .server-icon img { width: 100%; height: 100%; object-fit: cover; }
        .server-info { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: flex-start; }
        .server-info h3 { margin: 0 0 5px 0; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .server-info p { margin: 0; color: #b0b3b8; font-size: 14px; }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-top: 10px; }
        .status-badge.added { background: rgba(67, 181, 129, 0.2); color: #43b581; }
        .status-badge.invite { background: rgba(88, 101, 242, 0.2); color: #5865F2; }

        /* Loading Animation */
        .loader-container { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; gap: 20px; }
        
        .loader-robot { width: 200px; animation: pulseLoader 1.2s infinite ease-in-out; margin-bottom: 20px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        
        @keyframes pulseLoader { 
            0%, 100% { transform: scale(0.95); opacity: 0.8; } 
            50% { transform: scale(1.05); opacity: 1; } 
        }

        .loader-text { color: #b0b3b8; font-size: 16px; font-weight: 600; letter-spacing: 1px; animation: textPulse 1.2s ease-in-out infinite; margin-top: 10px;}
        @keyframes textPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* Language Switcher */
        .lang-switcher { position: absolute; top: 20px; right: 20px; display: flex; gap: 5px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .lang-btn { padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.3s; border: none; background: transparent; color: #b0b3b8; }
        .lang-btn.active { background: #5865F2; color: white; }
        .lang-btn:hover:not(.active) { color: white; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <a href="/" style="position: absolute; top: 20px; left: 20px; display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; opacity: 0.8; transition: 0.3s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'">
        <img src="/logo.png" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover;">
        <span style="font-weight: 600; font-size: 14px;">Velyx</span>
    </a>

    <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLanguage('ru')" id="btn-ru">RU</button>
        <button class="lang-btn" onclick="setLanguage('en')" id="btn-en">EN</button>
    </div>

    <h1 style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 20px;">
        <span data-i18n="select_server">Выберете</span> 
        <span style="display: flex; align-items: center; gap: 8px;">
            <svg width="32" height="32" viewBox="0 0 127.14 96.36" fill="#5865F2">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.48,80.21a105.73,105.73,0,0,0,32.22,16.15,77.7,77.7,0,0,1,7.21-11.73,69.07,69.07,0,0,1-11.33-5.41,52.86,52.86,0,0,0,2.14-1.67,76.92,76.92,0,0,0,65.7,0,54.14,54.14,0,0,0,2.14,1.67,70.13,70.13,0,0,1-11.31,5.41,76.2,76.2,0,0,0,7.2,11.72,105.71,105.71,0,0,0,32.25-16.15C130.58,52.2,121.35,28.69,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
            </svg>
            Discord
        </span>
        <span data-i18n="server_word">сервер</span>
    </h1>
    <div class="grid" id="servers">
        <div class="loader-container">
            <img src="/loader.gif" class="loader-robot" alt="Loading...">
            <div class="loader-text" data-i18n="loading">Поиск ваших серверов...</div>
        </div>
    </div>
 
    <script>
        const translations = {
            ru: {
                title: "Velyx | Серверы",
                select_server: "Выберете",
                server_word: "сервер",
                loading: "Поиск ваших серверов...",
                no_servers: "У вас нет серверов с правами Администратора",
                error: "Ошибка загрузки",
                add: "Добавить",
                manage: "Управлять",
                developed_by: "Разработано Senk"
            },
            en: {
                title: "Velyx | Servers",
                select_server: "Select a",
                server_word: "server",
                loading: "Searching for your servers...",
                no_servers: "You don't have any servers with Admin permissions",
                error: "Load error",
                add: "Add",
                manage: "Manage",
                developed_by: "Developed by Senk"
            }
        };

        function setLanguage(lang) {
            localStorage.setItem('lang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = translations[lang][key];
            });
            document.title = translations[lang].title;
            
            document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');

            // Update footer credit if it exists
            const footer = document.querySelector('footer div');
            if (footer) footer.innerText = translations[lang].developed_by;

            // Re-render servers if they are already loaded
            if (window.currentServers) renderServers(window.currentServers);
        }

        // Initialize language
        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('lang') || 'ru';
            setLanguage(savedLang);
        });

        let globalData = null;

        function renderServers() {
            const container = document.getElementById('servers');
            if (!globalData || !globalData.servers) return;
            
            const lang = localStorage.getItem('lang') || 'ru';
            const servers = globalData.servers;

            if (servers.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-dim); padding: 40px;">${translations[lang].no_servers}</div>`;
                return;
            }

            container.innerHTML = '';
            servers.forEach(s => {
                const iconHtml = s.icon 
                    ? `<img src="https://cdn.discordapp.com/icons/${s.id}/${s.icon}.png">`
                    : s.name.charAt(0);
                
                const link = s.botInServer 
                    ? `/panel?server=${s.id}`
                    : `https://discord.com/oauth2/authorize?client_id=${globalData.clientId}&permissions=8&scope=bot%20applications.commands&guild_id=${s.id}`;
                
                const badgeClass = s.botInServer ? 'added' : 'invite';
                const badgeText = s.botInServer ? translations[lang].manage : translations[lang].add;
                const badge = `<div class="status-badge ${badgeClass}">${badgeText}</div>`;

                container.innerHTML += `
                    <a href="${link}" class="server-card" ${!s.botInServer ? 'target="_blank"' : ''}>
                        <div class="server-icon">${iconHtml}</div>
                        <div class="server-info">
                            <h3>${s.name}</h3>
                            ${badge}
                        </div>
                    </a>
                `;
            });
        }

        async function loadServers() {
            const container = document.getElementById('servers');
            const lang = localStorage.getItem('lang') || 'ru';
            try {
                const res = await fetch('/api/auth/me');
                if (res.status === 401) return window.location.href = '/api/auth/login';
                
                if (!res.ok) {
                    container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #ff4757; padding: 40px;">${translations[lang].error}: ${res.statusText}</div>`;
                    return;
                }

                globalData = await res.json();
                renderServers();
            } catch(e) {
                console.error(e);
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #ff4757; padding: 40px;">${translations[lang].error}</div>`;
            }
        }
        loadServers();
    </script>
    <footer style="text-align: center; margin-top: 50px; color: #4f545c; font-size: 14px;">
        <div data-i18n="developed_by">Разработано Senk</div>
    </footer>
</body>
</html>
