<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velyx | Авторизация</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5865F2;
            --primary-hover: #4752C4;
            --bg: #0f1012;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Particles */
        .bg-circles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        .circle {
            position: absolute;
            background: radial-gradient(circle, rgba(88, 101, 242, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: float 20s infinite alternate;
        }
        .c1 { width: 600px; height: 600px; top: -100px; left: -100px; animation-duration: 25s; }
        .c2 { width: 500px; height: 500px; bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(147, 51, 234, 0.1) 0%, transparent 70%); animation-duration: 30s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.1); }
        }

        .login-card {
            background: rgba(26, 28, 30, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 60px 40px;
            border-radius: 32px;
            text-align: center;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            animation: cardEntrance 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .brand-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 30px;
            box-shadow: 0 0 40px rgba(88, 101, 242, 0.3);
            border: 2px solid rgba(88, 101, 242, 0.5);
            object-fit: cover;
            animation: logoPulse 3s infinite;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(88, 101, 242, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(88, 101, 242, 0.5); }
        }

        h1 { margin: 0 0 12px 0; font-weight: 800; font-size: 38px; letter-spacing: -1px; background: linear-gradient(to right, #fff, #b0b3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: rgba(255, 255, 255, 0.5); margin-bottom: 40px; font-size: 17px; line-height: 1.6; font-weight: 300; }

        .btn-discord {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 18px 36px;
            border-radius: 18px;
            font-weight: 600;
            font-size: 18px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(88, 101, 242, 0.4);
        }

        .btn-discord:hover {
            background: #fff;
            color: #000;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.2);
        }

        .btn-discord svg { width: 26px; height: 26px; fill: currentColor; }
        
        .footer-credit {
            position: absolute;
            bottom: 30px;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="bg-circles">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
    </div>

    <div class="login-card">
        <img src="/logo.png" alt="Velyx" class="brand-logo">
        <h1>Velyx</h1>
        <p>Добро пожаловать. Пожалуйста, авторизуйтесь через Discord для управления вашими серверами.</p>
        
        <a href="/api/auth/login" class="btn-discord">
            <svg viewBox="0 0 127.14 96.36">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.48,80.21a105.73,105.73,0,0,0,32.22,16.15,77.7,77.7,0,0,0,7.21-11.73,69.07,69.07,0,0,1-11.33-5.41,52.86,52.86,0,0,0,2.14-1.67,76.92,76.92,0,0,0,65.7,0,54.14,54.14,0,0,0,2.14,1.67,70.13,70.13,0,0,1-11.31,5.41,76.2,76.2,0,0,0,7.2,11.72,105.71,105.71,0,0,0,32.25-16.15C130.58,52.2,121.35,28.69,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
            </svg>
            Войти через Discord
        </a>
    </div>

    <div class="footer-credit">Разработано Senk</div>
</body>
</html>
