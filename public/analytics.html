<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velyx Dashboard - Аналитика</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #5865F2;
            --bg-dark: #1e1e2e;
            --card-bg: #2b2b3b;
            --accent: #00d2ff;
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid var(--accent);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #fff;
            margin-top: 10px;
        }

        .stat-label {
            color: #8e9297;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        .chart-container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .server-list {
            margin-top: 20px;
        }

        .server-item {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .server-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 15px;
            background: var(--primary);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">Velyx</div>
            <nav>
                <a href="dashboard.html">Главная</a>
                <a href="servers.html">Мои Сервера</a>
                <a href="analytics.html" class="active">Аналитика</a>
                <a href="ads.html">Реклама</a>
                <a href="/api/auth/logout">Выйти</a>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1>Аналитика сервера</h1>
                <div class="user-info" id="userInfo">Загрузка...</div>
            </header>

            <div class="analytics-grid">
                <div class="stat-card" style="border-color: #5865F2;">
                    <div class="stat-label">Всего серверов</div>
                    <div class="stat-value" id="totalServers">0</div>
                </div>
                <div class="stat-card" style="border-color: #00d2ff;">
                    <div class="stat-label">Всего участников</div>
                    <div class="stat-value" id="totalMembers">0</div>
                </div>
                <div class="stat-card" style="border-color: #00ff88;">
                    <div class="stat-label">Активные за день</div>
                    <div class="stat-value" id="activeUsers">0</div>
                </div>
                <div class="stat-card" style="border-color: #ffcc00;">
                    <div class="stat-label">Сообщений сегодня</div>
                    <div class="stat-value" id="messagesToday">0</div>
                </div>
            </div>

            <div class="chart-container">
                <h3>Активность за последние 7 дней</h3>
                <canvas id="activityChart"></canvas>
            </div>

            <div class="chart-container">
                <h3>Подключенные сервера</h3>
                <div id="serverList" class="server-list"></div>
            </div>
        </main>
    </div>

    <script>
        async function loadAnalytics() {
            try {
                const response = await fetch('/api/analytics');
                const data = await response.json();

                document.getElementById('totalServers').innerText = data.totalServers;
                document.getElementById('totalMembers').innerText = data.totalMembers;
                document.getElementById('activeUsers').innerText = data.activeUsers;
                document.getElementById('messagesToday').innerText = data.messagesToday;

                const serverList = document.getElementById('serverList');
                data.servers.forEach(guild => {
                    const item = document.createElement('div');
                    item.className = 'server-item';
                    item.innerHTML = `
                        <img class="server-icon" src="${guild.icon || 'https://via.placeholder.com/40'}" alt="">
                        <div>
                            <strong>${guild.name}</strong><br>
                            <span style="color:#8e9297">${guild.memberCount} участников</span>
                        </div>
                    `;
                    serverList.appendChild(item);
                });

                renderChart();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function renderChart() {
            const ctx = document.getElementById('activityChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'],
                    datasets: [{
                        label: 'Сообщения',
                        data: [120, 190, 300, 250, 400, 350, 450],
                        borderColor: '#00d2ff',
                        backgroundColor: 'rgba(0, 210, 255, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        fetch('/api/user').then(res => res.json()).then(user => {
            document.getElementById('userInfo').innerText = `${user.username}#${user.discriminator}`;
        });

        loadAnalytics();
    </script>
</body>
</html>
